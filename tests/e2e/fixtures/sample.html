<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Contextext sample page</title>
    <style>
      body { font-family: system-ui, sans-serif; max-width: 720px; margin: 40px auto; padding: 0 24px; line-height: 1.6; }
      h1 { font-size: 24px; }
      p { font-size: 16px; }
    </style>
  </head>
  <body>
    <h1>Sample article</h1>
    <p id="p1">
      The quick brown fox jumps over the lazy dog. This sentence is famous because it
      contains every letter of the English alphabet at least once.
    </p>
    <p id="p2">
      Pangrams are commonly used to display font samples and to test typewriters and
      computer keyboards.
    </p>
    <textarea id="ta" rows="3" cols="60">Selectable text inside a textarea control.</textarea>
  </body>
</html>
